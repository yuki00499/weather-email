services:
  weather-email:
    build: .
    container_name: weather-email
    restart: unless-stopped
    ports:
      - "8080:5000"
    volumes:
      - weather-email-data:/app/data
    environment:
      - TZ=Asia/Hong_Kong
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  weather-email-data:
